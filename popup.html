<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <title>Figma Text Diff</title>

  <style>
    body {
      width: 320px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 16px;
      background-color: #ffffff;
      color: #333;
      margin: 0;
    }

    h3 {
      margin: 0 0 16px 0;
      font-size: 16px;
      font-weight: 600;
      color: #111;
    }

    textarea {
      width: 100%;
      height: 180px;
      margin-top: 12px;
      font-size: 12px;
      padding: 10px;
      border: 1px solid #e6e6e6;
      border-radius: 6px;
      resize: vertical;
      box-sizing: border-box;
      font-family: 'SFMono-Regular', Consolas, monospace;
      background-color: #f9f9f9;
    }

    textarea:focus {
      outline: none;
      border-color: #18a0fb;
      background-color: #fff;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      background-color: #18a0fb;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background-color: #0d8de3;
    }

    .switch-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #f5f5f5;
      padding: 12px;
      border-radius: 8px;
    }

    .switch-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .switch-item input {
      cursor: pointer;
      margin: 0;
    }

    .hint {
      margin-top: 16px;
      font-size: 11px;
      color: #888;
      line-height: 1.4;
      border-top: 1px solid #eee;
      padding-top: 12px;
    }
  </style>
</head>

<body>

  <h3>Figma Text Diff - By <a href="https://www.linkedin.com/in/guilhermestaffen/" target="_blank">Guilherme Staffen</a></h3>

  <div class="switch-container">
    <label class="switch-item">
      <input type="checkbox" id="plainMode" checked />
      Texto simples
    </label>

    <label class="switch-item">
      <input type="checkbox" id="caseSensitive" checked />
      Diferenciar maiúsculas/minúsculas
    </label>

    <label class="switch-item">
      <input type="checkbox" id="accentSensitive" checked />
      Identificar acentuação
    </label>
  </div>

  <textarea id="baseline" placeholder="Cole seu texto ou JSON aqui..."></textarea>

  <button id="compare">
    Comparar textos
  </button>

  <div class="hint">
    ✔ Texto simples → um texto por linha

    <br><br>

    ✔ JSON → formato:
    {"texts":[]}
  </div>

  <script src="popup.js"></script>

</body>

</html>
