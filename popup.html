<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <title>Figma Text Diff</title>

  <style>
    body {
      width: 340px;
      font-family: Arial, sans-serif;
      padding: 12px;
    }

    textarea {

      width: 100%;
      height: 240px;

      margin-top: 10px;

      font-size: 12px;

      resize: vertical;
    }

    button {

      width: 100%;

      margin-top: 12px;

      padding: 10px;

      cursor: pointer;
    }

    .switch-container {

      display: flex;
      align-items: center;
      gap: 8px;

      margin-top: 10px;
    }

    .hint {

      margin-top: 10px;

      font-size: 12px;

      color: #666;
    }
  </style>
</head>

<body>

  <h3>Figma Text Diff</h3>

  <div class="switch-container">

    <input type="checkbox" id="plainMode" checked />
    <label for="plainMode">
      Texto simples
    </label>

    <input type="checkbox" id="caseSensitive" checked />
    <label for="caseSensitive">
      Diferenciar maiúsculas de minúsculas
    </label>

    <input type="checkbox" id="accentSensitive" checked />
    <label for="accentSensitive">
      Identificar acentuação
    </label>
  </div>

  <textarea id="baseline"></textarea>

  <button id="compare">
    Comparar textos
  </button>

  <div class="hint">
    ✔ Texto simples → um texto por linha

    <br><br>

    ✔ JSON → formato:
    {"texts":[]}
  </div>

  <script src="popup.js"></script>

</body>

</html>
